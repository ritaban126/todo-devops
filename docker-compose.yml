services:
  backend:
    build: ./backend
    container_name: backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"


  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=http://13.49.80.216:3000
    container_name: frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend